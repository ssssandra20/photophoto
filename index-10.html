<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 展場獎金對帳系統</title>
    
    <!-- 核心外部庫載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/lucide-react.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #FDFBF9; 
            color: #3E2723; 
            -webkit-tap-highlight-color: transparent; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #FDFBF9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D7CCC8; border-radius: 10px; }

        .boutique-glow { 
            border: 1.5px solid #D4AF37; 
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2); 
        }

        .premium-gold-block { 
            background: #FFF9E5; 
            border: 1.5px solid #E9D5A3; 
            box-shadow: 0 4px 15px rgba(198, 166, 100, 0.1); 
        }

        .edit-pulse { 
            animation: pulse-red 2s infinite; 
        }

        @keyframes pulse-red {
            0% { border-color: #FECACA; }
            50% { border-color: #EF4444; }
            100% { border-color: #FECACA; }
        }

        input, select, textarea { font-size: 16px !important; }
        button:active { transform: scale(0.98); }

        .filter-select {
            @apply bg-white border border-[#EFEBE9] rounded-lg p-2 text-xs font-bold outline-none shadow-sm focus:ring-1 ring-[#C6A664];
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseOps = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp, updateDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const PRINT_PLANS = [
            { id: 'p_classic', name: '經典方案 (19800)', price: 19800, baseBonus: 1000 },
            { id: 'p_boutique', name: '精品方案 (23800)', price: 23800, baseBonus: 1000 },
            { id: 'p_flag', name: '旗艦方案 (26800)', price: 26800, baseBonus: 2000 },
            { id: 'p_double', name: '雙享方案 (32800)', price: 32800, baseBonus: 2500 }
        ];

        const MIXER_PLANS = [
            { id: 'm_90', name: '拌伴酒90分鐘', price: 22999, baseBonus: 1000, giftLimit: 1000 },
            { id: 'm_120', name: '拌伴酒120分鐘', price: 26999, baseBonus: 2000, giftLimit: 2000 },
            { id: 'm_180', name: '拌伴酒180分鐘', price: 29999, baseBonus: 2500, giftLimit: 3000 }
        ];

        const CATEGORIES = {
            printcard: { label: '印卡讚', icon: 'CreditCard', hasGifts: true, plans: PRINT_PLANS },
            mixer: { label: '拌伴酒', icon: 'Wine', hasGifts: false, plans: MIXER_PLANS },
            joint: { label: '酒印專案', icon: 'Layers', hasGifts: true, isJoint: true }
        };

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const lib = window.LucideReact || window.lucide || {};
            const icons = lib.icons || lib;
            const IconComp = icons[name] || icons['HelpCircle'];
            return IconComp ? <IconComp size={size} className={className} /> : <span className="w-4 h-4 bg-gray-200 inline-block" />;
        };

        const App = () => {
            const salesNames = ["請選擇", "安安", "陸西", "宜霠", "若喬", "蕓襄"];
            const activeSalesNames = salesNames.filter(n => n !== "請選擇");
            const months = ["2026 年4-6月", "2026 年7-9月", "2026 年10-12月", "2027 年1-3月", "2027 年4-6月", "未定"];
            const quickRejectReasons = ["請選擇退回理由", "照片模糊", "金額計算有誤", "贈品不符", "備註不完整", "客戶退訂", "其他需修正"];

            const summaryMonthsList = useMemo(() => {
                const list = [];
                for (let y = 2026; y <= 2027; y++) {
                    for (let m = 1; m <= 12; m++) {
                        list.push(`${y}-${m.toString().padStart(2, '0')}`);
                    }
                }
                return list;
            }, []);

            const [role, setRole] = useState('sales');
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [orders, setOrders] = useState([]);
            const [orderCategory, setOrderCategory] = useState('printcard');
            const [editingId, setEditingId] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);
            const [managerView, setManagerView] = useState('approval');

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [filterCategory, setFilterCategory] = useState("all");
            const [filterPlan, setFilterPlan] = useState("all");
            const [filterSales, setFilterSales] = useState("all");

            const createInitialCatState = (cat) => ({
                planId: CATEGORIES[cat].plans ? CATEGORIES[cat].plans[0].id : null,
                planIdPrint: PRINT_PLANS[0].id,
                planIdMixer: MIXER_PLANS[0].id,
                giftA: (cat === 'mixer') ? 0 : 1,
                giftB: (cat === 'mixer') ? 0 : 1,
                isFamilyPrice: false,
                isNoGame: false,
                discounts: [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                addOns: [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                travelExpense: 0,
                mixerGiftAmount: 0,
                boutiqueReason: ""
            });

            const [catStates, setCatStates] = useState({
                printcard: createInitialCatState('printcard'),
                mixer: createInitialCatState('mixer'),
                joint: createInitialCatState('joint')
            });

            const updateCatState = (field, value) => {
                setCatStates(prev => ({
                    ...prev,
                    [orderCategory]: { ...prev[orderCategory], [field]: value }
                }));
            };

            const [selectedSales, setSelectedSales] = useState(activeSalesNames[0]);
            const [coSales, setCoSales] = useState("");
            const [coProcess, setCoProcess] = useState("");
            const [shareCount, setShareCount] = useState(0);
            const [signingDate, setSigningDate] = useState(new Date().toISOString().split('T')[0]);
            const [eventMonth, setEventMonth] = useState("未定");
            const [remarks, setRemarks] = useState("");
            const [photoBase64, setPhotoBase64] = useState(null);
            
            const [showCoSales, setShowCoSales] = useState(false);
            const [showShare, setShowShare] = useState(false);
            const [showMixerGift, setShowMixerGift] = useState(false);
            const [showDiscounts, setShowDiscounts] = useState(false);
            const [showAddOns, setShowAddOns] = useState(false);

            const [isSubmitting, setIsSubmitting] = useState(false);
            const [individualRejects, setIndividualRejects] = useState({});

            const showAlert = useCallback((msg) => {
                setAlertMsg(msg);
                setTimeout(() => setAlertMsg(null), 3000);
            }, []);

            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FirebaseOps) return;
                    const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseOps;
                    try {
                        const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : {};
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const dbInstance = getFirestore(app);
                        setDb(dbInstance);

                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) await signInWithCustomToken(auth, token);
                        else await signInAnonymously(auth);

                        onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
                    } catch (err) { setLoading(false); }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const { collection, onSnapshot } = window.FirebaseOps;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'bonus-calc-2026';
                const cols = ['orders_printcard', 'orders_mixer', 'orders_joint'];
                const unsubs = cols.map(col => onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', col), (snapshot) => {
                    const colOrders = snapshot.docs.map(d => ({ id: d.id, _col: col, category: col.replace('orders_', ''), ...d.data() }));
                    setOrders(prev => {
                        const filtered = prev.filter(o => o._col !== col);
                        return [...filtered, ...colOrders].sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    });
                }, (err) => console.warn(err)));
                return () => unsubs.forEach(u => u());
            }, [user, db]);

            const currentCat = catStates[orderCategory];
            const currentPlan = useMemo(() => {
                if (orderCategory === 'joint') return null;
                const plans = CATEGORIES[orderCategory]?.plans || [];
                return plans.find(p => p.id === currentCat.planId) || plans[0];
            }, [orderCategory, currentCat.planId]);

            const jointPlans = useMemo(() => {
                if (orderCategory !== 'joint') return null;
                const p = PRINT_PLANS.find(x => x.id === currentCat.planIdPrint) || PRINT_PLANS[0];
                const m = MIXER_PLANS.find(x => x.id === currentCat.planIdMixer) || MIXER_PLANS[0];
                return { p, m };
            }, [orderCategory, currentCat.planIdPrint, currentCat.planIdMixer]);

            const priceCalc = useMemo(() => {
                let basePrice = 0;
                let formulaPrefix = "";
                if (orderCategory === 'joint') {
                    basePrice = (jointPlans.p.price || 0) + (jointPlans.m.price || 0) - 2000;
                    formulaPrefix = `${jointPlans.p.price} + ${jointPlans.m.price} - 2000(酒印優惠)`;
                } else {
                    basePrice = currentPlan ? currentPlan.price : 0;
                    formulaPrefix = currentPlan ? `${currentPlan.price}` : "0";
                }
                const familyDeduction = (!currentCat.isFamilyPrice || orderCategory === 'mixer') ? 0 : 500;
                const noGameDeduction = (orderCategory !== 'mixer' && currentCat.isNoGame) ? 1000 : 0;
                const totalDiscounts = currentCat.discounts.reduce((acc, d) => acc + (parseInt(d.amount) || 0), 0);
                const totalAddOns = currentCat.addOns.reduce((acc, a) => acc + (parseInt(a.amount) || 0), 0);
                const total = basePrice - familyDeduction - noGameDeduction - totalDiscounts + currentCat.travelExpense + totalAddOns;
                let formula = formulaPrefix;
                if (familyDeduction > 0) formula += ` - 500(親友)`;
                if (noGameDeduction > 0) formula += ` - 1000(無遊戲)`;
                currentCat.discounts.forEach(d => { if(d.amount > 0) formula += ` - ${d.amount}(${d.name || '折扣'})`; });
                currentCat.addOns.forEach(a => { if(a.amount > 0) formula += ` + ${a.amount}(${a.name || '加購'})`; });
                if (currentCat.travelExpense > 0) formula += ` + ${currentCat.travelExpense}(車馬)`;
                return { total, formula };
            }, [orderCategory, currentPlan, jointPlans, currentCat]);

            const bonusCalc = useMemo(() => {
                let baseBonus = (orderCategory === 'joint') ? (jointPlans.p.baseBonus + jointPlans.m.baseBonus) : (currentPlan ? currentPlan.baseBonus : 0);
                const totalGifts = currentCat.giftA + currentCat.giftB;
                let giftPenalty = 0;
                let giftFormulaText = "0 (贈品未超標)";
                if (totalGifts > 2) {
                    const costs = [...Array(currentCat.giftA).fill(300), ...Array(currentCat.giftB).fill(500)].sort((a,b)=>b-a);
                    giftPenalty = costs.slice(2).reduce((a,b)=>a+b, 0);
                    giftFormulaText = `${giftPenalty} (贈品超標)`;
                }
                let mixerPenalty = (orderCategory === 'mixer' && currentPlan) ? Math.max(0, currentCat.mixerGiftAmount - currentPlan.giftLimit) : 0;
                if (orderCategory === 'joint') mixerPenalty = Math.max(0, currentCat.mixerGiftAmount - jointPlans.m.giftLimit);
                const totalDiscounts = currentCat.discounts.reduce((acc, d) => acc + (parseInt(d.amount) || 0), 0);
                const total = Math.max(0, baseBonus - giftPenalty - totalDiscounts - mixerPenalty);
                const formula = `${baseBonus} - ${giftFormulaText} - ${totalDiscounts} (讓利扣款)${mixerPenalty > 0 ? ` - ${mixerPenalty} (好禮超額)` : ''} = ${total}`;
                return { total, formula };
            }, [orderCategory, currentPlan, jointPlans, currentCat]);

            const stats = useMemo(() => {
                const confirmed = orders.filter(o => o.status === 'confirmed');
                const calcStats = (cat) => {
                    const filtered = confirmed.filter(o => o.category === cat);
                    return { count: filtered.length, bon: filtered.reduce((a, b) => a + (b.bonusTotal || 0), 0) };
                };
                return { print: calcStats('printcard'), mix: calcStats('mixer') };
            }, [orders]);

            const salesSpreadsheet = useMemo(() => {
                let filtered = orders.filter(o => o.status === 'confirmed');
                if (filterMonth !== "all") filtered = filtered.filter(o => o.signingDate && o.signingDate.startsWith(filterMonth));
                if (filterCategory !== "all") filtered = filtered.filter(o => o.category === filterCategory);
                if (filterPlan !== "all") filtered = filtered.filter(o => o.planName && o.planName.includes(filterPlan));

                return activeSalesNames.map(name => {
                    if (filterSales !== "all" && filterSales !== name) return { name, count: 0, bonus: 0, isHidden: true };
                    let count = 0; let bonus = 0;
                    const personal = filtered.filter(o => o.salesName === name || o.coSales === name);
                    personal.forEach(o => {
                        const factor = !!o.coSales ? 0.5 : 1;
                        count += factor;
                        bonus += (o.bonusTotal || 0) * factor;
                    });
                    const isConfirmed = personal.length > 0 && personal.every(o => o.mgrConfirmed === true);
                    const isPaid = personal.length > 0 && personal.every(o => o.mgrPaid === true);
                    return { name, count, bonus, isConfirmed, isPaid, isHidden: false };
                }).filter(row => !row.isHidden);
            }, [orders, activeSalesNames, filterMonth, filterCategory, filterPlan, filterSales]);

            const handleEdit = (order) => {
                setEditingId(order.id);
                setOrderCategory(order.category);
                setSelectedSales(order.salesName);
                setCoSales(order.coSales || "");
                setCoProcess(order.coProcess || "");
                setShareCount(order.shareCount || 0);
                setSigningDate(order.signingDate);
                setEventMonth(order.eventMonth);
                setRemarks(order.remarks || "");
                setPhotoBase64(order.photo || null);
                setCatStates(prev => ({
                    ...prev,
                    [order.category]: {
                        planId: order.planId || null, planIdPrint: order.planIdPrint || PRINT_PLANS[0].id, planIdMixer: order.planIdMixer || MIXER_PLANS[0].id,
                        giftA: order.giftA || 0, giftB: order.giftB || 0, isFamilyPrice: order.isFamilyPrice || false, isNoGame: order.isNoGame || false,
                        discounts: order.discounts || [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                        addOns: order.addOns || [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                        travelExpense: order.travelExpense || 0, mixerGiftAmount: order.mixerGiftAmount || 0, boutiqueReason: order.boutiqueReason || ""
                    }
                }));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleSubmit = async () => {
                if (!user || !db || isSubmitting) return;
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.FirebaseOps;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'bonus-calc-2026';
                if ((currentCat.planId === 'p_boutique' || currentCat.planIdPrint === 'p_boutique') && !currentCat.boutiqueReason) return showAlert("精品方案請必填下訂原因");
                setIsSubmitting(true);
                try {
                    const data = {
                        salesName: selectedSales, coSales, coProcess, shareCount,
                        planName: orderCategory === 'joint' ? `${jointPlans.p.name} + ${jointPlans.m.name}` : (currentPlan ? currentPlan.name : "未知"),
                        category: orderCategory, actualPrice: priceCalc.total, priceFormula: priceCalc.formula,
                        bonusTotal: bonusCalc.total, bonusFormula: bonusCalc.formula,
                        status: 'pending', rejectReason: '', ...currentCat,
                        signingDate, eventMonth, remarks, photo: photoBase64, updatedAt: serverTimestamp(), userId: user.uid,
                        mgrConfirmed: false, mgrPaid: false
                    };
                    if (editingId) {
                        const colPath = orders.find(o => o.id === editingId)?._col || `orders_${orderCategory}`;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', colPath, editingId), data);
                        showAlert("✅ 修正單據已提交！");
                    } else {
                        data.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `orders_${orderCategory}`), data);
                        showAlert("✅ 成交單據提交成功！");
                    }
                    setEditingId(null);
                    setCatStates(prev => ({ ...prev, [orderCategory]: createInitialCatState(orderCategory) }));
                    setRemarks(""); setPhotoBase64(null); setCoSales(""); setCoProcess(""); setShareCount(0);
                } catch (e) { showAlert("提交失敗"); } finally { setIsSubmitting(false); }
            };

            const handleStatusUpdate = async (order, status) => {
                const { updateDoc, doc } = window.FirebaseOps;
                const reason = individualRejects[order.id] || '';
                if (status === 'rejected' && (!reason || reason === quickRejectReasons[0])) return showAlert("請輸入退回理由");
                await updateDoc(doc(db, 'artifacts', typeof __app_id !== 'undefined' ? __app_id : 'bonus-calc-2026', 'public', 'data', order._col, order.id), { status, rejectReason: reason });
            };

            const handleMgrAction = async (salesName, field, newValue) => {
                const { updateDoc, doc } = window.FirebaseOps;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'bonus-calc-2026';
                const targets = orders.filter(o => o.status === 'confirmed' && o.signingDate && o.signingDate.startsWith(filterMonth) && (o.salesName === salesName || o.coSales === salesName));
                try {
                    for (const o of targets) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', o._col, o.id), { [field]: newValue }); }
                    showAlert("✅ 狀態已同步更新");
                } catch (e) { showAlert("更新失敗"); }
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-[#C6A664] animate-pulse text-lg">系統載入中...</div>;

            return (
                <div className="min-h-screen pb-20 px-3 md:px-0">
                    {alertMsg && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] bg-[#3E2723] text-[#C6A664] px-6 py-3 rounded-full shadow-2xl font-bold animate-in slide-in-from-top duration-300">{alertMsg}</div>
                    )}

                    <div className="bg-[#3E2723] p-3 flex justify-center gap-3 text-white text-[11px] font-bold tracking-widest uppercase shadow-xl sticky top-0 z-50">
                        <button onClick={()=>setRole('sales')} className={`px-5 py-2 rounded-full transition-all ${role === 'sales' ? 'bg-[#C6A664] text-[#3E2723]' : 'opacity-40'}`}>業務端</button>
                        <button onClick={()=>setRole('manager')} className={`px-5 py-2 rounded-full transition-all ${role === 'manager' ? 'bg-[#C6A664] text-[#3E2723]' : 'opacity-40'}`}>主管端</button>
                    </div>

                    <div className="max-w-6xl mx-auto mt-4 space-y-4 md:space-y-6 animate-in fade-in duration-500">
                        {/* 統計看板 */}
                        <div className="bg-[#5D4037] p-5 md:p-6 rounded-2xl md:rounded-3xl text-white shadow-lg border-b-4 border-[#C6A664]">
                            <div className="flex flex-col gap-5 md:flex-row md:justify-between md:items-center">
                                <div className="flex items-center gap-3 md:gap-4">
                                    <div className="bg-[#C6A664] p-3 rounded-xl shadow-inner text-[#3E2723]"><SafeIcon name="Calculator" size={24} /></div>
                                    <h1 className="text-xl md:text-2xl font-black tracking-tight leading-none">2026 展場對帳</h1>
                                </div>
                                {role === 'manager' ? (
                                    <div className="grid grid-cols-2 gap-4 md:gap-8 border-l border-white/10 pl-4 md:pl-8 text-xs">
                                        <div className="space-y-1"><p className="text-[#C6A664] font-black uppercase tracking-widest">印卡讚 (核准)</p>成交：{stats.print.count} 張單 / 獎：{stats.print.bon.toLocaleString()}</div>
                                        <div className="space-y-1"><p className="text-[#C6A664] font-black uppercase tracking-widest">拌伴酒 (核准)</p>成交：{stats.mix.count} 張單 / 獎：{stats.mix.bon.toLocaleString()}</div>
                                    </div>
                                ) : (
                                    <div className="text-left md:text-right border-t md:border-t-0 border-white/10 pt-4 md:pt-0">
                                        <span className="text-[9px] font-bold opacity-60 block uppercase tracking-widest">My Confirmed Bonus</span>
                                        <span className="text-xl md:text-2xl font-black text-[#C6A664]">${orders.filter(o => o.userId === user?.uid && o.status === 'confirmed').reduce((a,b)=>a+b.bonusTotal, 0).toLocaleString()}</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {role === 'sales' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                <div className="lg:col-span-7 space-y-5">
                                    {editingId && (
                                        <div className="bg-red-50 border-2 border-red-200 p-4 rounded-2xl flex justify-between items-center edit-pulse">
                                            <div className="flex items-center gap-2 text-red-700 font-black text-sm"><SafeIcon name="AlertCircle" size={18}/>單據修正中</div>
                                            <button onClick={()=>{setEditingId(null); setCatStates(prev=>({...prev, [orderCategory]: createInitialCatState(orderCategory)}));}} className="text-xs font-bold text-red-400 underline uppercase tracking-tighter">放棄修改</button>
                                        </div>
                                    )}

                                    <div className="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-[#D7CCC8] space-y-6">
                                        {/* 分類切換 */}
                                        <div className="grid grid-cols-3 gap-2 bg-[#FDFBF9] p-1.5 rounded-2xl border-2 border-[#EFEBE9]">
                                            {Object.keys(CATEGORIES).map(cat => (
                                                <button key={cat} onClick={()=>setOrderCategory(cat)} disabled={!!editingId} className={`py-3 rounded-xl font-black text-[11px] md:text-xs transition-all flex flex-col md:flex-row items-center justify-center gap-2 ${orderCategory === cat ? 'bg-[#5D4037] text-white shadow-md' : 'text-[#A1887F]'}`}>

                                                                    <div className="flex gap-1 mt-2">
                                                                        <select value={individualRejects[order.id] || quickRejectReasons[0]} onChange={(e)=>setIndividualRejects(prev => ({ ...prev, [order.id]: e.target.value }))} className="flex-grow p-2.5 bg-white border rounded-lg text-xs font-bold outline-none shadow-sm">{quickRejectReasons.map(r => <option key={r} value={r}>{r}</option>)}</select>
                                                                        <button onClick={()=>handleStatusUpdate(order, 'rejected')} className="px-4 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition-all flex items-center justify-center"><SafeIcon name="X" size={16}/></button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="bg-white p-5 md:p-8 rounded-3xl border border-[#D7CCC8] shadow-lg animate-in fade-in space-y-6">
                                        <div className="space-y-4">
                                            <h3 className="text-xl font-black text-[#5D4037] flex items-center gap-2"><SafeIcon name="Sheet" size={24}/> 業績彙整試算表</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-[#FDFBF9] p-4 rounded-2xl border border-[#EFEBE9]">
                                                <div className="space-y-1"><label className="text-[10px] font-black text-[#8D6E63] uppercase tracking-tighter">簽單月份</label><select value={filterMonth} onChange={(e)=>setFilterMonth(e.target.value)} className="w-full filter-select"><option value="all">全部</option>{summaryMonthsList.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                                                <div className="space-y-1"><label className="text-[10px] font-black text-[#8D6E63] uppercase tracking-tighter">方案類型</label><select value={filterCategory} onChange={(e)=>{setFilterCategory(e.target.value); setFilterPlan("all");}} className="w-full filter-select"><option value="all">全部</option><option value="printcard">印卡讚</option><option value="mixer">拌伴酒</option><option value="joint">酒印專案</option></select></div>
                                                <div className="space-y-1"><label className="text-[10px] font-black text-[#8D6E63] uppercase tracking-tighter">具體方案</label><select value={filterPlan} onChange={(e)=>setFilterPlan(e.target.value)} className="w-full filter-select"><option value="all">全部</option>
                                                    {filterCategory === "printcard" && PRINT_PLANS.map(p => <option key={p.id} value={p.name.split(' (')[0]}>{p.name}</option>)}
                                                    {filterCategory === "mixer" && MIXER_PLANS.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                                    {filterCategory === "joint" && <option value="酒印專案">酒印專案</option>}
                                                    {filterCategory === "all" && [...PRINT_PLANS, ...MIXER_PLANS].map(p => <option key={p.id} value={p.name.split(' (')[0]}>{p.name}</option>)}</select></div>
                                                <div className="space-y-1"><label className="text-[10px] font-black text-[#8D6E63] uppercase tracking-tighter">業務姓名</label><select value={filterSales} onChange={(e)=>setFilterSales(e.target.value)} className="w-full filter-select"><option value="all">全部</option>{activeSalesNames.map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                                            </div>
                                        </div>

                                        <div className="overflow-x-auto custom-scrollbar rounded-xl border border-[#EFEBE9]">
                                            <table className="w-full text-left border-collapse min-w-[750px]">
                                                <thead>
                                                    <tr className="bg-[#FDFBF9] text-[#8D6E63] border-b-2 border-[#EFEBE9] text-[11px] font-black uppercase tracking-wider">
                                                        <th className="p-4">業務姓名</th>
                                                        <th className="p-4 text-center">成交張數 (50/50)</th>
                                                        <th className="p-4 text-right text-amber-700">應撥獎金</th>
                                                        <th className="p-4 text-center">主管核對</th>
                                                        <th className="p-4 text-center">匯款狀態</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {salesSpreadsheet.map(row => (
                                                        <tr key={row.name} className="border-b border-[#F5F5F5] hover:bg-[#FDFBF9] transition-all">
                                                            <td className="p-4 font-black text-[#3E2723]">{row.name}</td>
                                                            <td className="p-4 text-center font-black text-[#5D4037]">{row.count > 0 ? row.count : '-'}</td>
                                                            <td className="p-4 text-right font-black text-amber-700 text-lg">${Math.round(row.bonus).toLocaleString()}</td>
                                                            <td className="p-4 text-center"><input type="checkbox" disabled={row.count === 0} checked={row.isConfirmed} onChange={(e)=>handleMgrAction(row.name, 'mgrConfirmed', e.target.checked)} className="w-5 h-5 accent-[#5D4037] cursor-pointer" /></td>
                                                            <td className="p-4 text-center"><button disabled={row.count === 0} onClick={()=>handleMgrAction(row.name, 'mgrPaid', !row.isPaid)} className={`px-3 py-1.5 rounded-full text-[10px] font-black transition-all ${row.isPaid ? 'bg-green-600 text-white shadow-md' : 'bg-gray-200 text-gray-400'}`}>{row.isPaid ? "已匯款" : "待發放"}</button></td>
                                                        </tr>
                                                    ))}
                                                    <tr className="bg-[#FFF9E5] font-black">
                                                        <td className="p-4">篩選後總計</td>
                                                        <td className="p-4 text-center text-lg">{salesSpreadsheet.reduce((a,b)=>a+b.count, 0)}</td>
                                                        <td className="p-4 text-right text-xl text-amber-800">${Math.round(salesSpreadsheet.reduce((a,b)=>a+b.bonus, 0)).toLocaleString()}</td>
                                                        <td colSpan="2"></td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
