<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 展場獎金對帳系統</title>
    <!-- 核心庫載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/lucide-react.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF9; color: #3E2723; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #FDFBF9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D7CCC8; border-radius: 10px; }
        svg { display: inline-block; vertical-align: middle; }
        .boutique-glow { border: 1.5px solid #D4AF37; box-shadow: 0 0 12px rgba(212, 175, 55, 0.2); }
        .premium-gold-block { background: #FFF9E5; border: 1.5px solid #E9D5A3; box-shadow: 0 4px 15px rgba(198, 166, 100, 0.1); }
        .edit-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { border-color: #FECACA; }
            50% { border-color: #EF4444; }
            100% { border-color: #FECACA; }
        }
        input, select, textarea { font-size: 16px !important; } 
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseOps = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp, updateDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const printPlans = [
            { id: 'p_classic', name: '經典方案 (19800)', price: 19800, baseBonus: 1000 },
            { id: 'p_boutique', name: '精品方案 (23800)', price: 23800, baseBonus: 1000 },
            { id: 'p_flag', name: '旗艦方案 (26800)', price: 26800, baseBonus: 2000 },
            { id: 'p_double', name: '雙享方案 (32800)', price: 32800, baseBonus: 2500 }
        ];

        const mixerPlans = [
            { id: 'm_90', name: '拌伴酒90分鐘', price: 22999, baseBonus: 1000, giftLimit: 1000 },
            { id: 'm_120', name: '拌伴酒120分鐘', price: 26999, baseBonus: 2000, giftLimit: 2000 },
            { id: 'm_180', name: '拌伴酒180分鐘', price: 29999, baseBonus: 2500, giftLimit: 3000 }
        ];

        const categories = {
            printcard: { label: '印卡讚', icon: 'CreditCard', hasGifts: true, plans: printPlans },
            mixer: { label: '拌伴酒', icon: 'Wine', hasGifts: false, plans: mixerPlans },
            joint: { label: '酒印專案', icon: 'Layers', hasGifts: true, isJoint: true }
        };

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const lib = window.LucideReact || window.lucide || {};
            const icons = lib.icons || lib;
            const IconComp = icons[name] || icons['HelpCircle'];
            return IconComp ? <IconComp size={size} className={className} /> : <span className="w-4 h-4 bg-gray-200 inline-block" />;
        };

        const App = () => {
            const salesNames = ["安安", "陸西", "宜霠", "若喬", "蕓襄"];
            const months = [ "2026 年4-6月", "2026 年7-9月", "2026 年10-12月", "2027 年1-3月","2027 年4-6月", "未定"];
            const quickRejectReasons = ["請選擇退回理由", "照片模糊", "金額計算有誤", "贈品不符", "備註不完整", "客戶退訂", "其他需修正"];

            const [role, setRole] = useState('sales');
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);
            const [orders, setOrders] = useState([]);
            const [orderCategory, setOrderCategory] = useState('printcard');
            const [editingId, setEditingId] = useState(null);

            const createInitialCatState = (cat) => ({
                planId: categories[cat].plans ? categories[cat].plans[0].id : null,
                planIdPrint: printPlans[0].id,
                planIdMixer: mixerPlans[0].id,
                giftA: (cat === 'mixer') ? 0 : 1,
                giftB: (cat === 'mixer') ? 0 : 1,
                isFamilyPrice: false,
                isNoGame: false,
                discounts: [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                addOns: [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                travelExpense: 0,
                mixerGiftAmount: 0,
                boutiqueReason: ""
            });

            const [catStates, setCatStates] = useState({
                printcard: createInitialCatState('printcard'),
                mixer: createInitialCatState('mixer'),
                joint: createInitialCatState('joint')
            });

            const updateCatState = (field, value) => {
                setCatStates(prev => ({
                    ...prev,
                    [orderCategory]: { ...prev[orderCategory], [field]: value }
                }));
            };

            const [selectedSales, setSelectedSales] = useState(salesNames[0]);
            const [coSales, setCoSales] = useState("");
            const [coProcess, setCoProcess] = useState("");
            const [shareCount, setShareCount] = useState(0);
            const [signingDate, setSigningDate] = useState(new Date().toISOString().split('T')[0]);
            const [eventMonth, setEventMonth] = useState("未定");
            const [remarks, setRemarks] = useState("");
            const [photoBase64, setPhotoBase64] = useState(null);
            
            const [showCoSales, setShowCoSales] = useState(false);
            const [showShare, setShowShare] = useState(false);
            const [showMixerGift, setShowMixerGift] = useState(false);
            const [showDiscounts, setShowDiscounts] = useState(false);
            const [showAddOns, setShowAddOns] = useState(false);

            const [isSubmitting, setIsSubmitting] = useState(false);
            const [individualRejects, setIndividualRejects] = useState({});

            useEffect(() => {
                const init = async () => {
                    if (!window.FirebaseOps) return;
                    const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseOps;
                    try {
                        const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : {};
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const dbInstance = getFirestore(app);
                        setDb(dbInstance);
                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) await signInWithCustomToken(auth, token);
                        else await signInAnonymously(auth);
                        onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
                    } catch (err) { setLoading(false); }
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const { collection, onSnapshot } = window.FirebaseOps;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'bonus-calc-2026';
                const cols = ['orders_printcard', 'orders_mixer', 'orders_joint'];
                const unsubs = cols.map(col => onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', col), (snapshot) => {
                    const colOrders = snapshot.docs.map(d => ({ id: d.id, _col: col, ...d.data() }));
                    setOrders(prev => [...prev.filter(o => o._col !== col), ...colOrders].sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }));
                return () => unsubs.forEach(u => u());
            }, [user, db]);

            const currentCat = catStates[orderCategory];
            const currentPlan = useMemo(() => {
                if (orderCategory === 'joint') return null;
                const plans = categories[orderCategory]?.plans || [];
                return plans.find(p => p.id === currentCat.planId) || plans[0];
            }, [orderCategory, currentCat.planId]);

            const jointPlans = useMemo(() => {
                if (orderCategory !== 'joint') return null;
                const p = printPlans.find(x => x.id === currentCat.planIdPrint) || printPlans[0];
                const m = mixerPlans.find(x => x.id === currentCat.planIdMixer) || mixerPlans[0];
                return { p, m };
            }, [orderCategory, currentCat.planIdPrint, currentCat.planIdMixer]);

            const priceCalc = useMemo(() => {
                let basePrice = 0;
                let formulaPrefix = "";
                if (orderCategory === 'joint') {
                    basePrice = (jointPlans.p.price || 0) + (jointPlans.m.price || 0) - 2000;
                    formulaPrefix = `${jointPlans.p.price} + ${jointPlans.m.price} - 2000(酒印優惠)`;
                } else {
                    basePrice = currentPlan ? currentPlan.price : 0;
                    formulaPrefix = currentPlan ? `${currentPlan.price}` : "0";
                }
                const familyDeduction = (!currentCat.isFamilyPrice || orderCategory === 'mixer') ? 0 : 500;
                const noGameDeduction = (orderCategory !== 'mixer' && currentCat.isNoGame) ? 1000 : 0;
                const totalDiscounts = currentCat.discounts.reduce((acc, d) => acc + (parseInt(d.amount) || 0), 0);
                const totalAddOns = currentCat.addOns.reduce((acc, a) => acc + (parseInt(a.amount) || 0), 0);
                const total = basePrice - familyDeduction - noGameDeduction - totalDiscounts + currentCat.travelExpense + totalAddOns;
                let formula = formulaPrefix;
                if (familyDeduction > 0) formula += ` - 500(親友)`;
                if (noGameDeduction > 0) formula += ` - 1000(無遊戲)`;
                currentCat.discounts.forEach(d => { if(d.amount > 0) formula += ` - ${d.amount}(${d.name || '折扣'})`; });
                currentCat.addOns.forEach(a => { if(a.amount > 0) formula += ` + ${a.amount}(${a.name || '加購'})`; });
                if (currentCat.travelExpense > 0) formula += ` + ${currentCat.travelExpense}(車馬)`;
                return { total, formula };
            }, [orderCategory, currentPlan, jointPlans, currentCat]);

            const bonusCalc = useMemo(() => {
                let baseBonus = 0;
                if (orderCategory === 'joint') {
                    baseBonus = (jointPlans.p.baseBonus || 0) + (jointPlans.m.baseBonus || 0);
                } else {
                    baseBonus = currentPlan ? currentPlan.baseBonus : 0;
                }
                const totalGifts = currentCat.giftA + currentCat.giftB;
                let giftPenalty = 0;
                let giftFormulaText = "0(贈品未超標)";
                if (totalGifts > 2) {
                    const costs = [...Array(currentCat.giftA).fill(300), ...Array(currentCat.giftB).fill(500)].sort((a,b)=>b-a);
                    giftPenalty = costs.slice(2).reduce((a,b)=>a+b, 0);
                    giftFormulaText = `${giftPenalty}(贈品超標)`;
                }
                let mixerPenalty = 0;
                if (orderCategory === 'mixer' && currentPlan) {
                    mixerPenalty = Math.max(0, currentCat.mixerGiftAmount - currentPlan.giftLimit);
                } else if (orderCategory === 'joint') {
                    mixerPenalty = Math.max(0, currentCat.mixerGiftAmount - jointPlans.m.giftLimit);
                }
                const totalDiscounts = currentCat.discounts.reduce((acc, d) => acc + (parseInt(d.amount) || 0), 0);
                const total = Math.max(0, baseBonus - giftPenalty - totalDiscounts - mixerPenalty);
                const formula = `${baseBonus} - ${giftFormulaText} - ${totalDiscounts}(讓利扣款)${mixerPenalty > 0 ? ` - ${mixerPenalty}(好禮超額)` : ''} = ${total}`;
                return { total, formula };
            }, [orderCategory, currentPlan, jointPlans, currentCat]);

            const statistics = useMemo(() => {
                const confirmed = orders.filter(o => o.status === 'confirmed');
                const calcStats = (cat) => {
                    const filtered = confirmed.filter(o => o.category === cat);
                    return { revenue: filtered.reduce((a, b) => a + (b.actualPrice || 0), 0), bonus: filtered.reduce((a, b) => a + (b.bonusTotal || 0), 0) };
                };
                return { printcard: calcStats('printcard'), mixer: calcStats('mixer') };
            }, [orders]);

            const startEditing = (order) => {
                setEditingId(order.id);
                setOrderCategory(order.category);
                setSelectedSales(order.salesName);
                setCoSales(order.coSales || "");
                setCoProcess(order.coProcess || "");
                setShareCount(order.shareCount || 0);
                setSigningDate(order.signingDate);
                setEventMonth(order.eventMonth);
                setRemarks(order.remarks || "");
                setPhotoBase64(order.photo || null);
                setCatStates(prev => ({
                    ...prev,
                    [order.category]: {
                        planId: order.planId, planIdPrint: order.planIdPrint, planIdMixer: order.planIdMixer,
                        giftA: order.giftA, giftB: order.giftB, isFamilyPrice: order.isFamilyPrice, isNoGame: order.isNoGame,
                        discounts: order.discounts || [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                        addOns: order.addOns || [{ name: "", amount: 0 }, { name: "", amount: 0 }, { name: "", amount: 0 }],
                        travelExpense: order.travelExpense, mixerGiftAmount: order.mixerGiftAmount, boutiqueReason: order.boutiqueReason || ""
                    }
                }));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const submitOrder = async () => {
                if (!user || !db || isSubmitting) return;
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.FirebaseOps;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'bonus-calc-2026';
                if ((currentCat.planId === 'p_boutique' || currentCat.planIdPrint === 'p_boutique') && !currentCat.boutiqueReason) return alert("精品方案請務必填寫下訂原因");
                setIsSubmitting(true);
                try {
                    const orderData = {
                        salesName: selectedSales, coSales, coProcess, shareCount,
                        planName: orderCategory === 'joint' ? `${jointPlans.p.name} + ${jointPlans.m.name}` : (currentPlan ? currentPlan.name : "未知"),
                        category: orderCategory, actualPrice: priceCalc.total, priceFormula: priceCalc.formula,
                        bonusTotal: bonusCalc.total, bonusFormula: bonusCalc.formula,
                        status: 'pending', rejectReason: '', ...currentCat,
                        signingDate, eventMonth, remarks, photo: photoBase64, updatedAt: serverTimestamp(), userId: user.uid
                    };
                    if (editingId) {
                        const targetCol = orders.find(o => o.id === editingId)?._col || `orders_${orderCategory}`;
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', targetCol, editingId), orderData);
                        alert("✅ 修正單據已提交！");
                    } else {
                        orderData.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `orders_${orderCategory}`), orderData);
                        alert("✅ 成交單據提交成功！");
                    }
                    setEditingId(null);
                    setCatStates(prev => ({ ...prev, [orderCategory]: createInitialCatState(orderCategory) }));
                    setRemarks(""); setPhotoBase64(null); setCoSales(""); setCoProcess(""); setShareCount(0);
                } catch (e) { alert("提交失敗"); } finally { setIsSubmitting(false); }
            };

            const updateStatus = async (order, status) => {
                const { updateDoc, doc } = window.FirebaseOps;
                const reason = individualRejects[order.id] || '';
                if (status === 'rejected' && (!reason || reason === quickRejectReasons[0])) return alert("請輸入退回理由");
                await updateDoc(doc(db, 'artifacts', typeof __app_id !== 'undefined' ? __app_id : 'bonus-calc-2026', 'public', 'data', order._col, order.id), { status, rejectReason: reason });
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-[#C6A664] animate-pulse">系統載入中...</div>;

            return (
                <div className="min-h-screen pb-20 px-3 md:px-0">
                    {/* 頂部導航 */}
                    <div className="bg-[#3E2723] p-3 flex justify-center gap-3 text-white text-[11px] font-bold tracking-widest uppercase shadow-xl sticky top-0 z-50">
                        <button onClick={()=>setRole('sales')} className={`px-5 py-2 rounded-full transition-all ${role === 'sales' ? 'bg-[#C6A664] text-[#3E2723]' : 'opacity-50'}`}>業務端</button>
                        <button onClick={()=>setRole('manager')} className={`px-5 py-2 rounded-full transition-all ${role === 'manager' ? 'bg-[#C6A664] text-[#3E2723]' : 'opacity-50'}`}>主管端</button>
                    </div>

                    <div className="max-w-6xl mx-auto mt-4 space-y-4 md:space-y-6 animate-in fade-in duration-500">
                        {/* 看板 */}
                        <div className="bg-[#5D4037] p-5 md:p-6 rounded-2xl md:rounded-3xl text-white shadow-lg border-b-4 border-[#C6A664]">
                            <div className="flex flex-col gap-4 md:flex-row md:justify-between md:items-center">
                                <div className="flex items-center gap-3 md:gap-4">
                                    <div className="bg-[#C6A664] p-2 md:p-3 rounded-xl shadow-inner text-[#3E2723]"><SafeIcon name="Calculator" size={24} /></div>
                                    <h1 className="text-xl md:text-2xl font-black tracking-tight leading-none">2026 展場對帳</h1>
                                </div>
                                {role === 'manager' ? (
                                    <div className="grid grid-cols-2 gap-4 md:gap-6 border-t md:border-t-0 md:border-l border-white/10 pt-4 md:pt-0 md:pl-6 text-xs md:text-sm">
                                        <div><p className="text-[9px] font-black text-[#C6A664] uppercase tracking-widest">印卡讚 (核准)</p>額：{statistics.printcard.revenue.toLocaleString()} / 獎：{statistics.printcard.bonus.toLocaleString()}</div>
                                        <div><p className="text-[9px] font-black text-[#C6A664] uppercase tracking-widest">拌伴酒 (核准)</p>額：{statistics.mixer.revenue.toLocaleString()} / 獎：{statistics.mixer.bonus.toLocaleString()}</div>
                                    </div>
                                ) : (
                                    <div className="text-left md:text-right border-t md:border-t-0 border-white/10 pt-3 md:pt-0">
                                        <span className="text-[9px] font-bold opacity-60 block uppercase">My Confirmed Bonus</span>
                                        <span className="text-xl md:text-2xl font-black text-[#C6A664]">${orders.filter(o => o.userId === user?.uid && o.status === 'confirmed').reduce((a,b)=>a+b.bonusTotal, 0).toLocaleString()}</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {role === 'sales' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                <div className="lg:col-span-7 space-y-4 md:space-y-6">
                                    {editingId && (
                                        <div className="bg-red-50 border-2 border-red-200 p-4 rounded-2xl flex justify-between items-center animate-in slide-in-from-top">
                                            <div className="flex items-center gap-2 text-red-700 font-black text-sm"><SafeIcon name="AlertCircle" size={18}/>單據修正中...</div>
                                            <button onClick={()=>{setEditingId(null); setCatStates(prev=>({...prev, [orderCategory]: createInitialCatState(orderCategory)}));}} className="text-xs font-bold text-red-400 underline uppercase tracking-tighter">放棄修改</button>
                                        </div>
                                    )}

                                    <div className="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border border-[#D7CCC8] space-y-5">
                                        <div className="grid grid-cols-3 gap-2 bg-[#FDFBF9] p-1 rounded-xl border-2 border-[#EFEBE9]">
                                            {Object.keys(categories).map(cat => (
                                                <button key={cat} onClick={()=>setOrderCategory(cat)} disabled={!!editingId} className={`py-2 md:py-3 rounded-lg font-black text-[11px] md:text-xs transition-all flex flex-col md:flex-row items-center justify-center gap-1 md:gap-2 ${orderCategory === cat ? 'bg-[#5D4037] text-white shadow-md' : 'text-[#A1887F]'}`}>
                                                    <SafeIcon name={categories[cat].icon} size={14}/> {categories[cat].label}
                                                </button>
                                            ))}
                                        </div>

                                        {/* 1. 合作與分享 (頂部收合) */}
                                        <div className="space-y-2">
                                            <div className="border border-[#EFEBE9] rounded-xl bg-white overflow-hidden shadow-sm">
                                                <button onClick={()=>setShowCoSales(!showCoSales)} className="w-full p-3 flex justify-between items-center bg-[#FDFBF9] hover:bg-[#EFEBE9] transition-all text-sm font-bold">
                                                    <span className="flex items-center gap-2"><SafeIcon name="Users" size={16}/> 合作業務資訊</span>
                                                    <SafeIcon name={showCoSales ? "ChevronUp" : "ChevronDown"} size={16} />
                                                </button>
                                                {showCoSales && (
                                                    <div className="p-4 space-y-4 bg-[#FDFBF9]/30 animate-in fade-in duration-300">
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                            <div className="space-y-1"><label className="text-[10px] text-[#8D6E63] font-bold">成交人員</label><select value={selectedSales} onChange={(e)=>setSelectedSales(e.target.value)} className="w-full p-2.5 bg-white border rounded-lg text-sm font-bold shadow-inner">{salesNames.map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                                                            <div className="space-y-1"><label className="text-[10px] text-[#8D6E63] font-bold">合作人員</label><input value={coSales} onChange={(e)=>setCoSales(e.target.value)} placeholder="姓名" className="w-full p-2.5 bg-white border rounded-lg text-sm font-bold shadow-inner" /></div>
                                                        </div>
                                                        <textarea value={coProcess} onChange={(e)=>setCoProcess(e.target.value)} placeholder="合作細節紀錄..." className="w-full p-2.5 bg-white border rounded-lg text-xs font-bold shadow-inner min-h-[60px]" />
                                                    </div>
                                                )}
                                            </div>
                                            <div className="border border-[#EFEBE9] rounded-xl bg-white overflow-hidden shadow-sm">
                                                <button onClick={()=>setShowShare(!showShare)} className="w-full p-3 flex justify-between items-center bg-[#FDFBF9] hover:bg-[#EFEBE9] transition-all text-sm font-bold">
                                                    <span className="flex items-center gap-2"><SafeIcon name="Share2" size={16}/> 宴後分享優惠</span>
                                                    <SafeIcon name={showShare ? "ChevronUp" : "ChevronDown"} size={16} />
                                                </button>
                                                {showShare && (
                                                    <div className="p-4 bg-[#FDFBF9] animate-in fade-in duration-300">
                                                        <div className="flex justify-between items-center mb-3 text-xs md:text-sm"><span className="font-black text-[#8D6E63]">平台分享數</span><span className="font-black text-[#C6A664]">預計折抵：${shareCount * 500}</span></div>
                                                        <div className="flex gap-2">{[0, 1, 2, 3, 4].map(num => <button key={num} onClick={()=>setShareCount(num)} className={`flex-1 py-3 rounded-lg text-xs font-bold border transition-all ${shareCount === num ? 'bg-[#5D4037] text-white border-[#5D4037]' : 'bg-white text-[#8D6E63]'}`}>{num}</button>)}</div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* 2. 選定成交方案 */}
                                        <div className="bg-[#FDFBF9] p-4 rounded-xl border border-[#EFEBE9] space-y-3 shadow-inner">
                                            <p className="text-[10px] font-black text-[#8D6E63] uppercase tracking-widest flex items-center gap-1"><SafeIcon name="CheckSquare" size={12}/> 選定成交方案</p>
                                            {orderCategory === 'joint' ? (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                    <select value={currentCat.planIdPrint} onChange={(e)=>updateCatState('planIdPrint', e.target.value)} className="w-full p-3 bg-white border rounded-xl text-sm font-bold shadow-sm outline-none">
                                                        {printPlans.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                                    </select>
                                                    <select value={currentCat.planIdMixer} onChange={(e)=>updateCatState('planIdMixer', e.target.value)} className="w-full p-3 bg-white border rounded-xl text-sm font-bold shadow-sm outline-none">
                                                        {mixerPlans.map(m => <option key={m} value={m.id}>{m.name}</option>)}
                                                    </select>
                                                </div>
                                            ) : (
                                                <select value={currentCat.planId} onChange={(e)=>updateCatState('planId', e.target.value)} className="w-full p-3 bg-white border rounded-xl text-sm font-bold shadow-sm outline-none">
                                                    {categories[orderCategory].plans.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                                </select>
                                            )}
                                        </div>

                                        {/* 3. 精品方案下訂原因 (置於方案選擇下方) */}
                                        {(currentCat.planId === 'p_boutique' || currentCat.planIdPrint === 'p_boutique') && (
                                            <div className="bg-amber-50 p-4 rounded-xl border border-[#D4AF37] space-y-2 animate-in zoom-in duration-300">
                                                <label className="text-[10px] font-black text-amber-700 flex items-center gap-1 uppercase"><SafeIcon name="MessageSquare" size={12}/> 精品方案下訂原因 (必填)</label>
                                                <textarea value={currentCat.boutiqueReason} onChange={(e)=>updateCatState('boutiqueReason', e.target.value)} placeholder="說明客戶下訂原因..." className="w-full p-3 bg-white border rounded-lg text-sm font-bold shadow-inner min-h-[60px] outline-none focus:ring-1 ring-amber-500"/>
                                            </div>
                                        )}

                                        {/* 4. 成交總價區塊 */}
                                        <div className="premium-gold-block p-4 md:p-5 rounded-2xl md:rounded-3xl space-y-4">
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm font-black text-[#8D6E63]">成交總價</span>
                                                <span className="text-2xl md:text-3xl font-black text-[#C6A664] tracking-tighter">${priceCalc.total.toLocaleString()}</span>
                                            </div>
                                            <div className="p-3 bg-white/70 rounded-xl border border-[#E9D5A3] text-[10px] font-mono font-bold text-[#8D6E63] leading-relaxed shadow-inner break-words">{priceCalc.formula}</div>
                                            
                                            <div className="grid grid-cols-2 gap-2">
                                                {orderCategory !== 'mixer' && <button onClick={()=>updateCatState('isFamilyPrice', !currentCat.isFamilyPrice)} className={`p-3 rounded-xl border-2 text-[10px] font-bold transition-all ${currentCat.isFamilyPrice ? 'bg-[#5D4037] text-white border-[#5D4037]' : 'bg-white text-[#8D6E63] border-[#E9D5A3]'}`}>親友折扣 -500</button>}
                                                {orderCategory !== 'mixer' && <button onClick={()=>updateCatState('isNoGame', !currentCat.isNoGame)} className={`p-3 rounded-xl border-2 text-[10px] font-bold transition-all ${currentCat.isNoGame ? 'bg-[#5D4037] text-white border-[#5D4037]' : 'bg-white text-[#8D6E63] border-[#E9D5A3]'}`}>不要遊戲 -1000</button>}
                                            </div>

                                            <div className="border border-[#E9D5A3] rounded-xl bg-white/60 overflow-hidden">
                                                <button onClick={()=>setShowDiscounts(!showDiscounts)} className="w-full p-3 flex justify-between items-center text-xs font-bold shadow-sm hover:bg-white/40"><span className="flex items-center gap-1"><SafeIcon name="Tag" size={14}/> 其他折扣明細</span><SafeIcon name={showDiscounts ? "ChevronUp" : "ChevronDown"} size={14} /></button>
                                                {showDiscounts && (
                                                    <div className="p-3 space-y-2 bg-[#FFFDF7] animate-in slide-in-from-top-2">{currentCat.discounts.map((d, i) => (<div key={i} className="flex gap-2"><input value={d.name} onChange={(e)=>{let n=[...currentCat.discounts]; n[i].name=e.target.value; updateCatState('discounts', n);}} placeholder={`折扣項目`} className="flex-grow p-2 bg-white border border-[#E9D5A3] rounded-lg text-xs font-bold outline-none" /><input type="number" value={d.amount || ""} onChange={(e)=>{let n=[...currentCat.discounts]; n[i].amount=parseInt(e.target.value)||0; updateCatState('discounts', n);}} placeholder="金額" className="w-20 p-2 bg-white border border-[#E9D5A3] rounded-lg text-xs font-bold text-center outline-none" /></div>))}</div>
                                                )}
                                            </div>

                                            <div className="border border-[#E9D5A3] rounded-xl bg-white/60 overflow-hidden">
                                                <button onClick={()=>setShowAddOns(!showAddOns)} className="w-full p-3 flex justify-between items-center text-xs font-bold shadow-sm hover:bg-white/40"><span className="flex items-center gap-1"><SafeIcon name="PlusCircle" size={14}/> 其他加購項目</span><SafeIcon name={showAddOns ? "ChevronUp" : "ChevronDown"} size={14} /></button>
                                                {showAddOns && (
                                                    <div className="p-3 space-y-2 bg-[#FFFDF7] animate-in slide-in-from-top-2">{currentCat.addOns.map((a, i) => (<div key={i} className="flex gap-2"><input value={a.name} onChange={(e)=>{let n=[...currentCat.addOns]; n[i].name=e.target.value; updateCatState('addOns', n);}} placeholder={`加購內容`} className="flex-grow p-2 bg-white border border-[#E9D5A3] rounded-lg text-xs font-bold outline-none" /><input type="number" value={a.amount || ""} onChange={(e)=>{let n=[...currentCat.addOns]; n[i].amount=parseInt(e.target.value)||0; updateCatState('addOns', n);}} placeholder="金額" className="w-20 p-2 bg-white border border-[#E9D5A3] rounded-lg text-xs font-bold text-center outline-none" /></div>))}</div>
                                                )}
                                            </div>

                                            <div className="flex gap-2">{[0, 1000, 2000].map(v => <button key={v} onClick={()=>updateCatState('travelExpense', v)} className={`flex-1 py-3 rounded-xl border-2 text-[10px] font-bold transition-all ${currentCat.travelExpense === v ? 'bg-[#C6A664] text-white border-[#C6A664]' : 'bg-white text-[#8D6E63] border-[#E9D5A3]'}`}>車馬 ${v}</button>)}</div>
                                        </div>

                                        {/* 5. 十大好禮贈送 */}
                                        {(orderCategory === 'mixer' || orderCategory === 'joint') && (
                                            <div className="border border-amber-200 rounded-xl bg-amber-50/50 overflow-hidden shadow-sm animate-in zoom-in duration-300">
                                                <button onClick={()=>setShowMixerGift(!showMixerGift)} className="w-full p-3 flex justify-between items-center bg-amber-100/50 hover:bg-amber-100 transition-all text-xs font-bold"><span className="flex items-center gap-1"><SafeIcon name="Gift" size={14}/> 十大好禮贈送 (獎金限額連動)</span><SafeIcon name={showMixerGift ? "ChevronUp" : "ChevronDown"} size={14} className="text-amber-600" /></button>
                                                {showMixerGift && (
                                                    <div className="p-4 bg-white space-y-3 animate-in fade-in duration-300">
                                                        <div className="flex justify-between items-center"><span className="text-[9px] font-bold text-amber-700">額度：${orderCategory === 'joint' ? jointPlans.m.giftLimit : currentPlan.giftLimit}</span><span className={`text-[9px] font-black ${bonusCalc.total === 0 ? 'text-red-500' : 'text-green-600'}`}>超額由獎金扣除</span></div>
                                                        <div className="grid grid-cols-4 gap-2">{[0, 1000, 2000, 3000].map(val => <button key={val} onClick={()=>updateCatState('mixerGiftAmount', val)} className={`py-3 rounded-lg text-[10px] font-bold border transition-all ${currentCat.mixerGiftAmount === val ? 'bg-amber-600 text-white border-amber-600 shadow-md' : 'bg-white text-amber-800'}`}>{val === 0 ? "無" : `$${val}`}</button>)}</div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {categories[orderCategory].hasGifts && (
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-[#8D6E63] flex items-center gap-2"><SafeIcon name="Gift" size={14}/> 贈品配置 (兩組內免扣)</label>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {['giftA', 'giftB'].map(g => (<div key={g} className="flex justify-between items-center bg-[#FDFBF9] p-3 rounded-xl border shadow-sm"><span className="text-[10px] font-bold text-[#8D6E63]">{g === 'giftA' ? 'A (300)' : 'B (500)'}</span><div className="flex items-center gap-3"><button onClick={()=>updateCatState(g, Math.max(0, currentCat[g]-1))} className="w-7 h-7 border rounded bg-white shadow-sm">-</button><span className="font-black text-sm w-4 text-center">{currentCat[g]}</span><button onClick={()=>updateCatState(g, currentCat[g]+1)} className="w-7 h-7 bg-[#5D4037] text-white rounded shadow-sm">+</button></div></div>))}
                                                </div>
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-1"><label className="text-[10px] text-[#8D6E63] font-bold uppercase tracking-widest">簽單日期</label><input type="date" value={signingDate} onChange={(e)=>setSigningDate(e.target.value)} className="w-full p-3 bg-[#FDFBF9] border rounded-xl text-sm font-bold shadow-inner outline-none"/></div>
                                            <div className="space-y-1"><label className="text-[10px] text-[#8D6E63] font-bold uppercase tracking-widest">活動月份</label><select value={eventMonth} onChange={(e)=>setEventMonth(e.target.value)} className="w-full p-3 bg-[#FDFBF9] border rounded-xl text-sm font-bold shadow-inner">{months.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <label className="cursor-pointer bg-[#EFEBE9] p-4 rounded-xl border-2 border-dashed border-[#A1887F] text-xs font-bold flex flex-col items-center justify-center gap-2 transition-all hover:bg-[#D7CCC8] shadow-sm"><SafeIcon name="Camera" size={20}/> {photoBase64 ? "已選擇照片" : "點擊上傳合約/簽單照"}<input type="file" className="hidden" onChange={(e)=>{ let f=e.target.files[0]; if(f){ let r=new FileReader(); r.onloadend=()=>setPhotoBase64(r.result); r.readAsDataURL(f); } }} /></label>
                                            <textarea value={remarks} onChange={(e)=>setRemarks(e.target.value)} placeholder="備註特殊需求..." className="w-full p-3 bg-[#FDFBF9] border rounded-xl text-sm font-bold shadow-inner min-h-[60px]"/>
                                        </div>

                                        <div className="bg-[#5D4037] p-6 md:p-8 rounded-2xl md:rounded-3xl text-white shadow-xl space-y-4 border-b-4 border-[#C6A664]">
                                            <div className="flex justify-between items-center">
                                                <div><p className="text-[10px] font-bold text-[#C6A664] uppercase tracking-widest opacity-80">Estimated Bonus</p><div className="text-3xl md:text-4xl font-black tracking-tight">${bonusCalc.total.toLocaleString()}</div></div>
                                                <button onClick={submitOrder} disabled={isSubmitting} className="bg-[#C6A664] text-[#3E2723] px-6 md:px-10 py-3 md:py-4 rounded-xl font-black text-sm md:text-base hover:scale-105 active:scale-95 transition-all shadow-lg disabled:opacity-50 tracking-widest">{isSubmitting ? "處理中" : (editingId ? "修正送出" : "送出審核")}</button>
                                            </div>
                                            <div className="p-3 bg-black/20 rounded-xl border border-white/10 text-[9px] md:text-[10px] font-mono font-bold text-[#D7CCC8] leading-relaxed break-words">獎金算式：{bonusCalc.formula}</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-5 space-y-4">
                                    <div className="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border border-[#D7CCC8]">
                                        <h2 className="text-lg md:text-xl font-bold flex items-center gap-2 mb-4 text-[#5D4037]"><SafeIcon name="History" size={22}/> 個人成交庫</h2>
                                        <div className="space-y-4 max-h-[600px] lg:max-h-[1000px] overflow-y-auto pr-1 custom-scrollbar">
                                            {orders.filter(o => o.userId === user?.uid).map(rec => (
                                                <div key={rec.id} className={`p-4 rounded-2xl border-2 shadow-sm transition-all ${rec.status === 'confirmed' ? 'bg-[#F1F8E9] border-[#AED581]' : rec.status === 'rejected' ? 'bg-[#FFEBEE] border-[#FFCDD2] edit-pulse' : 'bg-[#FDFBF9] border-[#EFEBE9]'}`}>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="space-y-1">
                                                            <div className="flex flex-wrap gap-2 mb-1">
                                                                <span className={`text-[8px] font-black px-2 py-0.5 rounded-full text-white ${rec.status === 'confirmed' ? 'bg-green-600' : rec.status === 'rejected' ? 'bg-red-600' : 'bg-gray-400'}`}>{rec.status === 'confirmed' ? '已核准' : rec.status === 'rejected' ? '被退回' : '審核中'}</span>
                                                                <span className="text-[8px] font-black bg-[#A1887F] text-white px-2 py-0.5 rounded-full uppercase">{categories[rec.category]?.label}</span>
                                                            </div>
                                                            <div className="font-black text-sm text-[#3E2723] leading-snug">{rec.planName}</div>
                                                            <div className="text-[9px] text-[#8D6E63] font-bold">{rec.signingDate}</div>
                                                        </div>
                                                        <div className="text-lg font-black text-[#5D4037]">${rec.bonusTotal?.toLocaleString()}</div>
                                                    </div>
                                                    <div className="bg-white/60 p-3 rounded-xl space-y-1 mt-3 text-[10px] font-bold text-[#8D6E63] shadow-inner break-words">
                                                        <div>價格：{rec.priceFormula}</div><div className="text-[#C6A664]">獎金：{rec.bonusFormula}</div>
                                                    </div>
                                                    {rec.status === 'rejected' && (<div className="mt-4 space-y-3"><div className="bg-red-600/10 p-3 rounded-xl border-l-4 border-red-500 text-[10px] font-black text-red-700 leading-tight">🚩 原因：{rec.rejectReason}</div><button onClick={()=>startEditing(rec)} className="w-full py-3 bg-red-600 text-white rounded-xl font-black text-xs flex items-center justify-center gap-2 hover:bg-red-700 transition-all shadow-md active:scale-95"><SafeIcon name="Edit3" size={14}/> 重新編輯並修正</button></div>)}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6 animate-in fade-in">
                                {['mixer', 'printcard', 'joint'].map(cat => {
                                    const catOrders = orders.filter(o => o.category === cat && o.status === 'pending');
                                    return (
                                        <div key={cat} className="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl border border-[#D7CCC8] shadow-sm space-y-4">
                                            <div className="flex justify-between items-center border-b pb-2 border-[#EFEBE9]"><h3 className="font-black flex items-center gap-2 text-[#5D4037] uppercase text-sm tracking-widest"><SafeIcon name={categories[cat].icon} size={16}/> {categories[cat].label}</h3><span className="bg-[#5D4037] text-white px-2 py-0.5 rounded-full text-[10px] font-bold">{catOrders.length} 待審</span></div>
                                            <div className="space-y-4 max-h-[600px] overflow-y-auto pr-1 custom-scrollbar">
                                                {catOrders.map(order => (
                                                    <div key={order.id} className="bg-[#FDFBF9] p-4 rounded-xl border border-[#EFEBE9] space-y-4 hover:border-[#C6A664] transition-all group shadow-sm"><div className="flex justify-between items-start"><div><div className="text-[10px] font-bold text-[#8D6E63]"><SafeIcon name="User" size={10}/> {order.salesName}</div><div className="font-black text-sm mt-1 leading-snug">{order.planName}</div></div><div className="text-xl font-black text-[#5D4037]">${order.bonusTotal?.toLocaleString()}</div></div><div className="text-[9px] font-mono bg-white p-2 rounded-lg border text-[#8D6E63] leading-relaxed font-bold break-words"><div>價格：{order.priceFormula}</div><div className="text-amber-600">獎金：{order.bonusFormula}</div></div><div className="flex flex-col gap-2 pt-2"><button onClick={()=>updateStatus(order, 'confirmed')} className="w-full py-3 bg-green-600 text-white rounded-xl font-black flex items-center justify-center gap-1 hover:bg-green-700 shadow-md active:scale-95 transition-all text-xs uppercase tracking-widest">核准單據</button><div className="space-y-1 mt-2 border-t pt-3 border-gray-100"><select value={individualRejects[order.id] || quickRejectReasons[0]} onChange={(e)=>setIndividualRejects(prev => ({ ...prev, [order.id]: e.target.value }))} className="w-full p-2.5 bg-white border rounded-lg text-xs font-bold outline-none shadow-sm">{quickRejectReasons.map(r => <option key={r} value={r}>{r}</option>)}</select><div className="flex gap-1"><input value={individualRejects[order.id] && !quickRejectReasons.includes(individualRejects[order.id]) ? individualRejects[order.id] : ""} onChange={(e)=>setIndividualRejects(prev => ({ ...prev, [order.id]: e.target.value }))} placeholder="手寫原因..." className="flex-grow text-xs p-2.5 border rounded-lg outline-none font-bold shadow-sm" /><button onClick={()=>updateStatus(order, 'rejected')} className="px-4 bg-red-600 text-white rounded-lg font-bold shadow hover:bg-red-700 active:scale-95 transition-all flex items-center justify-center"><SafeIcon name="X" size={16}/></button></div></div></div></div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
